<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Primal Dash</title>
<style>
  :root{
    --ink:#1c1408;
    --bone:#f0e4c4;
    --amber:#d98f2b;
    --ember:#c65a2e;
    --moss:#3f5b34;
    --moss-dark:#243a1e;
    --night:#12210f;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(ellipse at 50% 0%, #2a3c1a 0%, #0e1608 70%);
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #wrap{
    width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:14px;
  }
  #stage{
    position:relative;
    width:100%;
    max-width:900px;
    aspect-ratio: 2 / 1;
    border-radius:14px;
    overflow:hidden;
    box-shadow:
      0 0 0 3px var(--ink),
      0 0 0 7px var(--amber),
      0 20px 50px rgba(0,0,0,0.6);
    background:#87a86b;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
  }
  #titleBar{
    width:100%;
    max-width:900px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:2px 6px 10px 6px;
  }
  #logo{
    font-family: 'Impact','Arial Black',sans-serif;
    letter-spacing:2px;
    color:var(--bone);
    font-size:clamp(20px,4vw,32px);
    text-shadow: 2px 2px 0 var(--ember), 4px 4px 0 var(--ink);
    -webkit-text-stroke: 1px var(--ink);
  }
  #logo span{color:var(--amber);-webkit-text-stroke: 1px var(--ink);}
  #liveScore{
    font-family: 'Courier New', monospace;
    font-weight:bold;
    color:var(--bone);
    background:rgba(0,0,0,0.35);
    padding:4px 10px;
    border-radius:8px;
    font-size:clamp(13px,2.2vw,18px);
    border:1px solid rgba(240,228,196,0.25);
  }
  /* overlay screens */
  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg, rgba(10,16,6,0.72), rgba(10,16,6,0.88));
    color:var(--bone);
    text-align:center;
    gap:10px;
    padding:20px;
  }
  .overlay h1{
    font-family:'Impact','Arial Black',sans-serif;
    letter-spacing:2px;
    font-size:clamp(28px,6vw,52px);
    margin:0 0 4px 0;
    color:var(--bone);
    text-shadow: 3px 3px 0 var(--ember), 6px 6px 0 var(--ink);
    -webkit-text-stroke: 1.5px var(--ink);
  }
  .overlay h1 .bit{color:var(--amber);-webkit-text-stroke: 1.5px var(--ink);}
  .overlay p{
    margin:2px 0;
    font-size:clamp(12px,2.4vw,16px);
    color:#ddd7bd;
    max-width:420px;
    line-height:1.4;
  }
  .btn{
    margin-top:10px;
    font-family:'Impact','Arial Black',sans-serif;
    letter-spacing:1.5px;
    font-size:clamp(16px,3vw,22px);
    background: linear-gradient(180deg,var(--amber),#b56f1e);
    color:var(--ink);
    border:3px solid var(--ink);
    border-radius:10px;
    padding:10px 28px;
    cursor:pointer;
    box-shadow:0 5px 0 #7a4712, 0 8px 14px rgba(0,0,0,0.4);
    transition: transform .06s ease;
  }
  .btn:active{ transform: translateY(4px); box-shadow:0 1px 0 #7a4712; }
  .scoreRow{
    display:flex;gap:18px;
    margin-top:6px;
  }
  .scoreBox{
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(240,228,196,0.3);
    border-radius:10px;
    padding:8px 16px;
    min-width:110px;
  }
  .scoreBox .lbl{font-size:11px;letter-spacing:1px;color:var(--amber);text-transform:uppercase;}
  .scoreBox .val{font-family:'Courier New',monospace;font-size:22px;font-weight:bold;}
  #hint{
    position:absolute;
    bottom:8px;left:0;right:0;
    text-align:center;
    color:rgba(240,228,196,0.55);
    font-size:11px;
    letter-spacing:0.5px;
    pointer-events:none;
  }
  .hidden{display:none !important;}
  .new{
    color:var(--ember);
    font-weight:bold;
    animation:pulse 1s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
</style>
</head>
<body>
<div id="wrap">
  <div id="titleBar">
    <div id="logo">PRIMAL <span>DASH</span></div>
    <div id="liveScore">SCORE 0000 &nbsp;|&nbsp; BEST 0000</div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>

    <div class="overlay" id="startScreen">
      <h1>PRIMAL <span class="bit">DASH</span></h1>
      <p>Outrun The Awakening. Jump the rocks, logs, and prehistoric animals to survive. Grab every banana you can reach.</p>
      <div class="scoreRow">
        <div class="scoreBox"><div class="lbl">Best</div><div class="val" id="bestStart">0000</div></div>
      </div>
      <button class="btn" id="startBtn">START RUN</button>
      <p style="opacity:0.7;font-size:11px;">SPACE / TAP / CLICK to jump</p>
    </div>

    <div class="overlay hidden" id="overScreen">
      <h1>WIPED <span class="bit">OUT</span></h1>
      <div class="scoreRow">
        <div class="scoreBox"><div class="lbl">Score</div><div class="val" id="finalScore">0000</div></div>
        <div class="scoreBox"><div class="lbl">Best</div><div class="val" id="finalBest">0000</div></div>
      </div>
      <p id="newBestMsg" class="new hidden">NEW BEST SCORE!</p>
      <button class="btn" id="retryBtn">RUN AGAIN</button>
    </div>

    <div id="hint" class="hidden">SPACE / TAP to jump</div>
  </div>
</div>

  // ---------- persistent high score ----------
  let bestScore = 0;
  async function loadBest(){
    try{
      const res = await window.storage.get('primal-dash-best', false);
      if(res && res.value){ bestScore = parseInt(res.value) || 0; }
    }catch(e){ bestScore = 0; }
    bestStartEl.textContent = String(bestScore).padStart(4,'0');
    updateLiveScore(0);
  }
  async function saveBest(v){
    try{ await window.storage.set('primal-dash-best', String(v), false); }catch(e){}
  }
  loadBest();

  function updateLiveScore(cur){
    liveScoreEl.textContent = `SCORE ${String(Math.floor(cur)).padStart(4,'0')}  |  BEST ${String(bestScore).padStart(4,'0')}`;
  }

  // ---------- input ----------
  let jumpPressed = false;
  function tryJump(){
    if(state === 'playing') jumpPressed = true;
    else if(state === 'ready') beginGame();
    else if(state === 'over') { /* no-op, handled by button */ }
  }
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code === 'ArrowUp'){
      e.preventDefault();
      tryJump();
    }
  });
  canvas.addEventListener('pointerdown', (e)=>{ e.preventDefault(); tryJump(); });
  document.getElementById('stage').addEventListener('pointerdown', (e)=>{
    if(e.target === canvas) return; // handled above
  });

  startBtn.addEventListener('click', beginGame);
  retryBtn.addEventListener('click', beginGame);

  // ---------- state machine ----------
  let state = 'ready'; // ready | playing | over

  // ---------- world / parallax ----------
  const layers = [
    {speed:0.15, color:'#1c3315', trees:[]},  // far
    {speed:0.35, color:'#274a1c', trees:[]},  // mid
    {speed:0.65, color:'#33601f', trees:[]},  // near
  ];
  function genTrees(layer, density, wMin,wMax,hMin,hMax){
    layer.trees = [];
    let x = -50;
    while(x < W*2.4){
      const w = wMin + Math.random()*(wMax-wMin);
      const h = hMin + Math.random()*(hMax-hMin);
      layer.trees.push({x, w, h});
      x += w + density + Math.random()*density;
    }
  }
  genTrees(layers[0], 30, 60,120, 100,165);
  genTrees(layers[1], 24, 55,100, 80,145);
  genTrees(layers[2], 18, 45,80, 65,120);

  // overhead canopy — hanging leaf clusters across the top of the screen
  const canopy = { clumps: [] };
  (function genCanopy(){
    let x = -60;
    while(x < W*2.4){
      const w = 90 + Math.random()*110;
      const drop = 34 + Math.random()*46;
      canopy.clumps.push({x, w, drop});
      x += w*0.55 + Math.random()*30;
    }
  })();

  let bgScroll = 0;

  // ---------- player ----------
  const player = {
    x: 130,
    y: GROUND_Y,
    vy: 0,
    w: 58,
    h: 74,
    grounded: true,
    runT: 0,
    jumps: 0,
    maxJumps: 2, // allow small double-hop for forgiveness
  };
  const GRAVITY = 0.62;
  const JUMP_V = -12.6;

  function resetPlayer(){
    player.y = GROUND_Y;
    player.vy = 0;
    player.grounded = true;
    player.runT = 0;
    player.jumps = 0;
  }

  // ---------- obstacles ----------
  // types: rock, log, mammoth, sabretooth
  let obstacles = [];
  let spawnTimer = 0;
  let nextSpawnIn = 70;

  function spawnObstacle(speed){
    const roll = Math.random();
    let type;
    if(roll < 0.30) type = 'rock';
    else if(roll < 0.55) type = 'log';
    else if(roll < 0.8) type = 'sabretooth';
    else type = 'mammoth';

    let w,h;
    if(type==='rock'){ w=44; h=40; }
    else if(type==='log'){ w=70; h=32; }
    else if(type==='sabretooth'){ w=70; h=54; }
    else { w=100; h=88; }

    const standY = GROUND_Y + 6; // top edge of the ground/grass line
    obstacles.push({
      type, w, h,
      x: W + 40,
      y: standY - h, // sits with feet exactly on the ground line
      passed:false,
    });

    // ensure fair minimum gap based on current speed
    const minGapPx = Math.max(230, speed*46);
    nextSpawnIn = (minGapPx/speed) + Math.random()*40;
    spawnTimer = 0;
  }

  // ---------- bananas ----------
  let bananas = [];
  function spawnBanana(){
    const groundTop = GROUND_Y + 6; // same reference obstacles stand on
    const lowY = groundTop - 45;    // runnable height, clear of the ground
    const heights = [lowY, lowY-55, lowY-100];
    const y = heights[Math.floor(Math.random()*heights.length)];
    bananas.push({x: W+60+Math.random()*60, y, t: Math.random()*Math.PI*2, collected:false});
  }
  let bananaTimer = 0;
  let nextBananaIn = 90;

  // ---------- game vars ----------
  let speed = 6.4;
  const speedMax = 19;
  const BASE_SPEED = 6.4;
  const SPEEDUP_INTERVAL_SEC = 3; // every 3 seconds the run gets faster
  const SPEEDUP_STEP = 0.85;      // how much speed is added each interval
  const FPS_ASSUMED = 60;
  let score = 0;
  let distanceScore = 0;
  let frame = 0;

  function beginGame(){
    obstacles = [];
    bananas = [];
    spawnTimer = 0; nextSpawnIn = 90;
    bananaTimer = 0; nextBananaIn = 80;
    speed = 6.4;
    score = 0; distanceScore = 0; frame = 0;
    resetPlayer();
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    hint.classList.remove('hidden');
    state = 'playing';
  }

  async function endGame(){
    state = 'over';
    hint.classList.add('hidden');
    const finalS = Math.floor(score);
    let isNew = false;
    if(finalS > bestScore){ bestScore = finalS; isNew = true; saveBest(bestScore); }
    finalScoreEl.textContent = String(finalS).padStart(4,'0');
    finalBestEl.textContent = String(bestScore).padStart(4,'0');
    newBestMsg.classList.toggle('hidden', !isNew);
    updateLiveScore(finalS);
    overScreen.classList.remove('hidden');
  }

  // ---------- collision ----------
  function collide(px,py,pw,ph, ox,oy,ow,oh){
    // shrink hitboxes a bit for fairness
    const pad = 10;
    return !(px+pad > ox+ow-8 || px+pw-pad < ox+8 || py+pad > oy+oh-6 || py+ph-pad < oy+6);
  }

  // ---------- drawing helpers ----------
  function drawGroundAndSky(){
    // sky (slightly dimmer/greener — filtered forest light instead of open sky)
    const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
    sky.addColorStop(0,'#e0b563');
    sky.addColorStop(0.45,'#dd8f57');
    sky.addColorStop(1,'#c06a52');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,GROUND_Y+6);

    // sun (dappled through the canopy)
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#ffe9a8';
    ctx.beginPath();
    ctx.arc(W*0.78, 100, 42, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // parallax tree layers
    layers.forEach((layer,i)=>{
      const offset = (bgScroll*layer.speed) % (W*2.4);
      ctx.fillStyle = layer.color;
      layer.trees.forEach(t=>{
        let x = t.x - offset;
        if(x < -150) x += W*2.4;
        if(x > W+150) x -= W*2.4;
        drawTreeBlob(x, GROUND_Y+4, t.w, t.h);
      });
    });

    // overhead forest canopy — hanging leaf clusters + vines across the top
    drawCanopy();

    // ground
    const groundGrad = ctx.createLinearGradient(0,GROUND_Y,0,H);
    groundGrad.addColorStop(0,'#6b4a2a');
    groundGrad.addColorStop(1,'#3f2c18');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0,GROUND_Y+4,W,H-GROUND_Y-4);

    // ground texture stripes (scrolling)
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 3;
    const stripeOffset = (bgScroll*1.0) % 40;
    for(let x=-stripeOffset; x<W; x+=40){
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y+14);
      ctx.lineTo(x-18, H);
      ctx.stroke();
    }
    // top ground edge grass
    ctx.fillStyle = '#5b7a2e';
    ctx.fillRect(0,GROUND_Y+2,W,7);
  }

  function drawCanopy(){
    const offset = (bgScroll*0.5) % (W*2.4);
    ctx.save();
    canopy.clumps.forEach(c=>{
      let x = c.x - offset;
      if(x < -150) x += W*2.4;
      if(x > W+150) x -= W*2.4;
      // dark leaf mass hanging from the top edge
      const grad = ctx.createLinearGradient(0,0,0,c.drop);
      grad.addColorStop(0,'#16280d');
      grad.addColorStop(1,'rgba(22,40,13,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x-c.w/2,0);
      ctx.quadraticCurveTo(x-c.w/2, c.drop*0.7, x-c.w/4, c.drop);
      ctx.quadraticCurveTo(x, c.drop*1.1, x+c.w/4, c.drop);
      ctx.quadraticCurveTo(x+c.w/2, c.drop*0.7, x+c.w/2, 0);
      ctx.closePath();
      ctx.fill();
      // lighter leaf clump edge for depth
      ctx.fillStyle = 'rgba(45,74,26,0.85)';
      ctx.beginPath();
      ctx.ellipse(x, c.drop*0.35, c.w*0.32, c.drop*0.4, 0, 0, Math.PI*2);
      ctx.fill();
      // thin hanging vine
      if(c.w > 140){
        ctx.strokeStyle = 'rgba(20,32,12,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, c.drop*0.6);
        ctx.quadraticCurveTo(x+6, c.drop*1.3, x-4, c.drop*1.8);
        ctx.stroke();
      }
    });
    ctx.restore();
  }

  function drawTreeBlob(x,baseY,w,h){
    // trunk
    ctx.fillRect(x-4, baseY-h*0.35, 8, h*0.35);
    // foliage blob (jungle canopy silhouette)
    ctx.beginPath();
    ctx.moveTo(x-w/2, baseY-h*0.3);
    ctx.quadraticCurveTo(x-w/2-8, baseY-h*0.75, x-w/4, baseY-h);
    ctx.quadraticCurveTo(x, baseY-h*1.15, x+w/4, baseY-h);
    ctx.quadraticCurveTo(x+w/2+8, baseY-h*0.75, x+w/2, baseY-h*0.3);
    ctx.quadraticCurveTo(x, baseY-h*0.15, x-w/2, baseY-h*0.3);
    ctx.fill();
  }

  function drawRunningArm(shoulderX, shoulderY, swing, upperColor, foreColor, handColor){
    // swing ranges roughly -22..22; convert to a forward/back swing angle from vertical
    const angle = (swing/22) * 1.15; // radians, positive = swings forward (+x)
    const upperLen = 21, foreLen = 22;
    // upper arm: shoulder -> elbow
    const elbowX = shoulderX + Math.sin(angle)*upperLen;
    const elbowY = shoulderY + Math.cos(angle)*upperLen*0.92;
    ctx.strokeStyle = upperColor;
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(shoulderX, shoulderY);
    ctx.lineTo(elbowX, elbowY);
    ctx.stroke();
    // forearm: bends more when swinging forward (hand rises toward chest), extends
    // straighter when swinging back — the natural asymmetry of a running pump
    const bend = angle >= 0
      ? 1.15 + (angle/1.15)*0.55   // forward: elbow folds up sharply
      : 0.35 + (-angle/1.15)*0.25; // backward: arm trails out straighter
    const foreAngle = angle + bend;
    const handX = elbowX + Math.sin(foreAngle)*foreLen*0.72;
    const handY = elbowY + Math.cos(foreAngle)*foreLen*0.5 + 4;
    ctx.strokeStyle = foreColor;
    ctx.lineWidth = 10.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(elbowX, elbowY);
    ctx.lineTo(handX, handY);
    ctx.stroke();
    // rounded elbow joint — smooths the kink between the two segments
    ctx.fillStyle = foreColor;
    ctx.beginPath();
    ctx.arc(elbowX, elbowY, 5.2, 0, Math.PI*2);
    ctx.fill();
    // fist
    ctx.fillStyle = handColor;
    ctx.beginPath();
    ctx.arc(handX, handY, 6.5, 0, Math.PI*2);
    ctx.fill();
  }

  // ---------- character drawing (animated) ----------
  function drawPlayer(){
    const bounce = player.grounded ? Math.sin(player.runT*0.55)*3 : 0;
    const cx = player.x + player.w/2;
    const cy = player.y - player.h/2 + bounce;

    ctx.save();
    ctx.translate(cx, cy);

    // running limb phase
    const legPhase = player.runT*0.55;
    const legSwing = player.grounded ? Math.sin(legPhase)*26 : 8;
    const legSwing2 = player.grounded ? Math.sin(legPhase+Math.PI)*26 : -14;
    const armSwing = player.grounded ? Math.sin(legPhase+Math.PI)*20 : -10;
    const armSwing2 = player.grounded ? Math.sin(legPhase)*20 : 18;
    // subtle shoulder bob for a more natural upper-body drive while running
    const shoulderBob = player.grounded ? Math.sin(legPhase*2)*1.4 : 0;

    // ---- back leg ----
    ctx.strokeStyle = '#2e2015';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-9, 24);
    ctx.lineTo(-9+legSwing2*0.5, 24+Math.abs(legSwing2)*0.7+18);
    ctx.stroke();
    ctx.fillStyle = '#1c130c';
    ctx.beginPath();
    ctx.ellipse(-9+legSwing2*0.5, 24+Math.abs(legSwing2)*0.7+18, 10,6.5,0,0,Math.PI*2);
    ctx.fill();

    // ---- back arm ----
    drawRunningArm(-15, -20+shoulderBob, armSwing2, '#2e1d10', '#3c2716', '#1c130c');

    // ---- jacket torso (one continuous procedural body matching the reference jacket) ----
    const torsoGrad = ctx.createLinearGradient(-23,-30,23,24);
    torsoGrad.addColorStop(0,'#5a3b23');
    torsoGrad.addColorStop(1,'#3c2716');
    ctx.fillStyle = torsoGrad;
    roundRect(-23,-30,46,54,15);
    ctx.fill();
    // white shirt/collar
    ctx.fillStyle = '#eee7d8';
    roundRect(-9,-28,18,20,6);
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(-9,-22+i*7);
      ctx.lineTo(9,-22+i*7);
      ctx.stroke();
    }
    // shoulder patches
    ctx.fillStyle = '#2e1d10';
    roundRect(-25,-30,15,16,6); ctx.fill();
    roundRect(10,-30,15,16,6); ctx.fill();
    // jacket buttons
    ctx.fillStyle = '#caa24a';
    [-12,0,12].forEach((yy)=>{
      ctx.beginPath(); ctx.arc(18, yy, 2.4, 0, Math.PI*2); ctx.fill();
    });
    // jacket bottom hem shading (keeps continuity down toward the legs)
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    roundRect(-23,14,46,10,8);
    ctx.fill();

    // ---- neck fur bridging jacket collar to the head ----
    ctx.fillStyle = '#5c5c64';
    roundRect(-11,-34,22,14,7);
    ctx.fill();

    // ---- head: the real reference image, mounted flush on the neck/collar ----
    if(charImgLoaded){
      const hw = 80, hh = hw*(charImg.naturalHeight/charImg.naturalWidth);
      ctx.drawImage(charImg, -hw/2, -26-hh, hw, hh);
    }

    // ---- front leg ----
    ctx.strokeStyle = '#3c2a1a';
    ctx.lineWidth = 15;
    ctx.beginPath();
    ctx.moveTo(9, 26);
    ctx.lineTo(9+legSwing*0.55, 26+Math.abs(legSwing)*0.7+18);
    ctx.stroke();
    ctx.fillStyle = '#241a10';
    ctx.beginPath();
    ctx.ellipse(9+legSwing*0.55, 26+Math.abs(legSwing)*0.7+18, 10,6.5,0,0,Math.PI*2);
    ctx.fill();

    // ---- front arm ----
    drawRunningArm(15, -20-shoulderBob, armSwing, '#4a2f1a', '#5a3b23', '#241a10');

    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // ---------- obstacle drawing ----------
  function drawObstacle(o){
    ctx.save();
    ctx.translate(o.x, o.y);
    if(o.type==='rock'){
      ctx.fillStyle = '#6b6355';
      ctx.beginPath();
      ctx.moveTo(0,o.h);
      ctx.lineTo(o.w*0.08,o.h*0.35);
      ctx.lineTo(o.w*0.4,0);
      ctx.lineTo(o.w*0.7,o.h*0.2);
      ctx.lineTo(o.w,o.h*0.5);
      ctx.lineTo(o.w,o.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.moveTo(o.w*0.4,0); ctx.lineTo(o.w*0.5,o.h*0.4); ctx.lineTo(o.w*0.3,o.h*0.4);
      ctx.closePath(); ctx.fill();
    } else if(o.type==='log'){
      ctx.fillStyle = '#6b4423';
      roundRect(0,o.h*0.25,o.w,o.h*0.55,10);
      ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)';
      ctx.lineWidth=2;
      for(let i=1;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(o.w*i/4, o.h*0.25);
        ctx.lineTo(o.w*i/4, o.h*0.8);
        ctx.stroke();
      }
      ctx.fillStyle = '#8a5c33';
      ctx.beginPath(); ctx.ellipse(o.w-6, o.h*0.52, 9, o.h*0.28, 0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#4a2c14'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(o.w-6, o.h*0.52, 5, o.h*0.15,0,0,Math.PI*2); ctx.stroke();
    } else if(o.type==='sabretooth'){
      // ground contact shadow for grounding + contrast against busy background
      ctx.fillStyle = 'rgba(0,0,0,0.32)';
      ctx.beginPath();
      ctx.ellipse(o.w*0.42, o.h*1.02, o.w*0.5, 7, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.lineJoin = 'round';
      ctx.fillStyle = '#e3ab52';
      ctx.strokeStyle = '#241608';
      ctx.lineWidth = 3;
      // body
      roundRect(0,o.h*0.3,o.w*0.85,o.h*0.5,16);
      ctx.fill(); ctx.stroke();
      // head
      ctx.beginPath();
      ctx.ellipse(o.w*0.82,o.h*0.42,18,16,0,0,Math.PI*2);
      ctx.fill(); ctx.stroke();
      // stripes
      ctx.strokeStyle='#4a2f14'; ctx.lineWidth=3;
      for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(o.w*0.1+i*14, o.h*0.32);
        ctx.lineTo(o.w*0.05+i*14, o.h*0.75);
        ctx.stroke();
      }
      // legs
      ctx.fillStyle = '#b08b45';
      ctx.strokeStyle = '#241608';
      ctx.lineWidth = 2.5;
      [4, o.w*0.55].forEach(fx=>{
        roundRect(fx,o.h*0.72,8,o.h*0.28,3);
        ctx.fill(); ctx.stroke();
      });
      // ear + eye
      ctx.fillStyle='#e3ab52';
      ctx.strokeStyle='#241608'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(o.w*0.78,o.h*0.28); ctx.lineTo(o.w*0.83,o.h*0.14); ctx.lineTo(o.w*0.88,o.h*0.28); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ffd75e';
      ctx.beginPath(); ctx.arc(o.w*0.88,o.h*0.4,2.6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#1a1208';
      ctx.beginPath(); ctx.arc(o.w*0.88,o.h*0.4,1.2,0,Math.PI*2); ctx.fill();
      // sabre teeth
      ctx.fillStyle = '#fff8e6';
      ctx.strokeStyle = '#241608';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(o.w*0.95,o.h*0.5);
      ctx.lineTo(o.w*0.9,o.h*0.78);
      ctx.lineTo(o.w*1.0,o.h*0.56);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if(o.type==='mammoth'){
      // ground contact shadow for grounding + contrast against busy background
      ctx.fillStyle = 'rgba(0,0,0,0.32)';
      ctx.beginPath();
      ctx.ellipse(o.w*0.4, o.h*1.02, o.w*0.55, 8, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.lineJoin = 'round';
      ctx.fillStyle = '#8c7454';
      ctx.strokeStyle = '#241a0f';
      ctx.lineWidth = 3.2;
      // body
      roundRect(0,o.h*0.28,o.w*0.72,o.h*0.5,20);
      ctx.fill(); ctx.stroke();
      // head
      ctx.beginPath();
      ctx.ellipse(o.w*0.8,o.h*0.42,22,20,0,0,Math.PI*2);
      ctx.fill(); ctx.stroke();
      // hump
      ctx.beginPath();
      ctx.ellipse(o.w*0.35,o.h*0.16,26,14,0,0,Math.PI*2);
      ctx.fill(); ctx.stroke();
      // legs
      ctx.fillStyle='#6b5a45';
      ctx.strokeStyle = '#241a0f';
      ctx.lineWidth = 2.5;
      [0.06,0.3,0.5].forEach(f=>{
        roundRect(o.w*f, o.h*0.72, 12, o.h*0.28, 3);
        ctx.fill(); ctx.stroke();
      });
      // tusks
      ctx.strokeStyle = '#fff8e6';
      ctx.lineWidth = 6;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(o.w*0.95, o.h*0.5);
      ctx.quadraticCurveTo(o.w*1.12, o.h*0.55, o.w*1.08, o.h*0.32);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(36,26,15,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(o.w*0.95, o.h*0.5);
      ctx.quadraticCurveTo(o.w*1.12, o.h*0.55, o.w*1.08, o.h*0.32);
      ctx.stroke();
      // eye
      ctx.fillStyle='#ffd75e';
      ctx.beginPath(); ctx.arc(o.w*0.85,o.h*0.36,2.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#1a1208';
      ctx.beginPath(); ctx.arc(o.w*0.85,o.h*0.36,1.3,0,Math.PI*2); ctx.fill();
      // trunk
      ctx.strokeStyle = '#8c7454';
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(o.w*0.94,o.h*0.46);
      ctx.quadraticCurveTo(o.w*1.0,o.h*0.7, o.w*0.9,o.h*0.85);
      ctx.stroke();
      ctx.strokeStyle = '#241a0f';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(o.w*0.94,o.h*0.46);
      ctx.quadraticCurveTo(o.w*1.0,o.h*0.7, o.w*0.9,o.h*0.85);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ---------- banana drawing ----------
  function drawBanana(b){
    const bob = Math.sin(b.t)*6;
    ctx.save();
    ctx.translate(b.x, b.y+bob);
    ctx.rotate(-0.5);
    ctx.fillStyle = '#f4d33c';
    ctx.beginPath();
    ctx.moveTo(-12,10);
    ctx.quadraticCurveTo(-4,-14, 14,-10);
    ctx.quadraticCurveTo(2,-2,-2,12);
    ctx.quadraticCurveTo(-8,14,-12,10);
    ctx.fill();
    ctx.strokeStyle='#b89620';
    ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(-10,9); ctx.quadraticCurveTo(-2,-8,12,-9);
    ctx.stroke();
    ctx.fillStyle = '#6b5a2a';
    ctx.beginPath(); ctx.ellipse(13,-10,2.4,2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- main loop ----------
  function update(){
    frame++;

    if(state === 'playing'){
      // speed ramps up
      // speed steps up every 5 seconds, rather than a slow continuous ramp
      const elapsedSeconds = frame / FPS_ASSUMED;
      const steps = Math.floor(elapsedSeconds / SPEEDUP_INTERVAL_SEC);
      speed = Math.min(speedMax, BASE_SPEED + steps*SPEEDUP_STEP);
      bgScroll += speed;
      distanceScore += speed*0.045;
      score = distanceScore;
      updateLiveScore(score);

      // player physics
      if(jumpPressed){
        if(player.jumps < player.maxJumps){
          player.vy = JUMP_V * (player.jumps===0?1:0.85);
          player.jumps++;
          player.grounded = false;
        }
        jumpPressed = false;
      }
      player.vy += GRAVITY;
      player.y += player.vy;
      if(player.y >= GROUND_Y){
        player.y = GROUND_Y;
        player.vy = 0;
        player.grounded = true;
        player.jumps = 0;
      }
      if(player.grounded) player.runT++;

      // spawn obstacles
      spawnTimer++;
      if(spawnTimer >= nextSpawnIn){
        spawnObstacle(speed);
      }
      // spawn bananas
      bananaTimer++;
      if(bananaTimer >= nextBananaIn){
        spawnBanana();
        bananaTimer = 0;
        nextBananaIn = 100 + Math.random()*120;
      }

      // move obstacles
      obstacles.forEach(o=> o.x -= speed);
      obstacles = obstacles.filter(o=> o.x+o.w > -50);

      // move bananas
      bananas.forEach(b=>{ b.x -= speed; b.t += 0.12; });
      bananas = bananas.filter(b=> b.x > -40 && !b.collected);

      // collisions - obstacles
      const centerX = player.x + player.w/2;
      const px = centerX - player.w*0.35;
      const py = player.y - player.h;
      const pw = player.w*0.7;
      const ph = player.h;
      for(const o of obstacles){
        if(collide(px,py,pw,ph, o.x,o.y,o.w,o.h)){
          endGame();
          break;
        }
      }
      // collisions - bananas
      for(const b of bananas){
        if(!b.collected){
          const dx = centerX - b.x;
          const dy = (player.y-player.h/2) - b.y;
          if(Math.sqrt(dx*dx+dy*dy) < 42){
            b.collected = true;
            score += 25;
            distanceScore += 25;
          }
        }
      }
    }
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawGroundAndSky();
    bananas.forEach(drawBanana);
    obstacles.forEach(drawObstacle);
    drawPlayer();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
